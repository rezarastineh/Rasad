version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: subspyder
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: subspyder
    ports:
      - "5432:5432"
    volumes:
      - subspyder_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  subspyder_pgdata:
